[pytest]
# pytest is the single orchestrator for the xqtl-protocol tests. There are two
# levels, carried by the DIRECTORY (not markers) so the layout is obvious on
# sight and mirrors the source tree:
#   tests/scripts/    -> tests of R wrapper scripts (mirrors code/script/**), run_r
#   tests/notebooks/  -> tests of SoS notebooks     (mirrors code/SoS/**),    run_sos
# Run from the repo root, e.g.:
#   pixi run pytest tests/scripts      # R-script tests (on committed fixtures)
#   pixi run pytest tests/notebooks    # notebook end-to-end (slowest)
#   pixi run pytest tests              # everything
testpaths = .
# importlib mode lets same-named test files live under each level/domain dir
# without __init__.py juggling.
addopts = -ra --import-mode=importlib
